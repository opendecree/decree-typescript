name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write
      contents: read
    env:
      NODE_AUTH_TOKEN: ""
      NPM_TOKEN: ""
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22.14"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - name: Update npm for trusted publishing
        run: npm install -g npm@latest
      - name: Remove temp npmrc so npm uses OIDC
        run: rm -f "$NPM_CONFIG_USERCONFIG"
      - name: Determine npm tag
        id: tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if echo "$VERSION" | grep -qE 'alpha|beta|rc'; then
            echo "tag=alpha" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi
      - run: npm publish --provenance --access public --tag ${{ steps.tag.outputs.tag }}

  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22.14"
      - run: npm ci
      - run: npm run build
      - name: Create tarball
        run: |
          VERSION="${{ github.ref_name }}"
          tar -czf "decree-typescript-${VERSION}.tar.gz" dist/
      - name: Determine if prerelease
        id: prerelease
        run: |
          VERSION="${{ github.ref_name }}"
          if echo "$VERSION" | grep -qE 'alpha|beta|rc'; then
            echo "flag=--prerelease" >> $GITHUB_OUTPUT
          else
            echo "flag=" >> $GITHUB_OUTPUT
          fi
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" \
            "decree-typescript-${TAG}.tar.gz" \
            --generate-notes \
            --title "Release ${TAG}" \
            ${{ steps.prerelease.outputs.flag }}
