# CI pipeline for the OpenDecree TypeScript SDK.
#
# Jobs: lint, typecheck, test (matrix: Node 20/22/24), examples → check (alls-green gate)
# The check job aggregates all results for branch protection.
#
# The first job defines YAML anchors (&checkout, &setup-node-22, &install)
# on its setup steps; subsequent jobs alias them to avoid repetition.
# The test job uses its own setup-node step because the matrix node-version
# varies per run.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - &checkout
        name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - &setup-node-22
        name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - &install
        name: Install dependencies
        run: npm ci
      - name: Run biome lint
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - *checkout
      - *setup-node-22
      - *install
      - name: Run tsc
        run: npm run typecheck

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22", "24"]
    steps:
      - *checkout
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - *install
      - name: Run tests with coverage
        run: npm run test:coverage

  examples:
    name: Examples
    runs-on: ubuntu-latest
    steps:
      - *checkout
      - *setup-node-22
      - name: Install SDK dependencies
        run: npm ci
      - name: Install example dependencies
        run: cd examples && npm install
      - name: Typecheck examples
        run: cd examples && npx tsc --noEmit

  check:
    name: CI check
    if: always()
    needs: [lint, typecheck, test, examples]
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
