name: Bug Report
description: Report a bug in the OpenDecree TypeScript SDK
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: To reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - ConfigClient
        - ConfigWatcher
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: SDK version
      placeholder: e.g., 0.1.0
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: e.g., 22
    validations:
      required: true
  - type: input
    id: server-version
    attributes:
      label: OpenDecree server version
      placeholder: e.g., v0.5.0
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g., Linux, macOS, Windows
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, or anything else that helps.
